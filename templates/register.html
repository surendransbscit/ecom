{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 400px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            color: #fff;
        }

        .auth-container h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .auth-container p {
            margin-bottom: 20px;
        }

        .auth-container label {
            display: none; /* hide default Django labels */
        }

        .auth-container input {
            width: 100%;
            padding: 14px 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            outline: none;
            color: #fff;
            font-size: 15px;
            margin-bottom: 18px;
        }

        .auth-container input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .extra {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .extra a {
            color: #ffd6ff;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #ffdddd;
            font-size: 13px;
            margin-bottom: 10px;
            list-style: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Create Account ✨</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.non_field_errors }}

        {% for field in form %}
            {{ field.errors }}
            {{ field }}
        {% endfor %}

        <button class="auth-btn">Register</button>
    </form>

    <div class="extra">
        <p>Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

</body>
</html>
