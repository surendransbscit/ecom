{% extends 'base.html' %}
{% block content %}

<h2>{{ product.name }}</h2>

<div class="gallery">
    {% for img in images %}
        <img src="{{ img.image.url }}">
    {% endfor %}
</div>

<p>{{ product.description }}</p>
<p>Price: ₹ {{ product.price }}</p>
<p>Stock: {{ product.stock }}</p>

{% endblock %}
